<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SahayCredit - Better Credit Decisions</title>
    <!-- Using a premium geometric sans-serif font -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --mint-green: #2ee68b;
            --mint-glow: rgba(46, 230, 139, 0.4);
            --blue-glow: rgba(56, 189, 248, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

            /* Hide scrollbar for Chrome, Safari and Opera */
            &::-webkit-scrollbar {
                display: none;
            }
            /* Hide scrollbar for IE, Edge and Firefox */
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        body, html {
            width: 100%;
            height: 100vh;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
            position: relative;
        }

        /* Minimal Tech/Grid Background */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -2;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at center, black, transparent 80%);
        }

        /* Glowing ambient orbs */
        .ambient-glow-1 {
            position: absolute;
            top: -10%; left: -10%;
            width: 50vw; height: 50vw;
            background: radial-gradient(circle, var(--blue-glow) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(60px);
        }

        .ambient-glow-2 {
            position: absolute;
            bottom: -20%; right: -10%;
            width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(46, 230, 139, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(60px);
        }

        /* Header / Glassmorphism */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 5%;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo-icon {
            color: var(--mint-green);
            font-size: 1.8rem;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 3rem;
            background: var(--surface);
            padding: 0.5rem 2rem;
            border-radius: 50px;
            border: 1px solid var(--border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        nav a {
            color: var(--text-sub);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }

        nav a.active, nav a:hover {
            color: var(--text-main);
        }

        .nav-right {
            display: flex;
            align-items: center;
        }

        .btn-outline {
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            color: var(--text-main);
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-outline:hover {
            border-color: var(--mint-green);
            background: rgba(46, 230, 139, 0.05);
            color: var(--mint-green);
        }

        main {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            min-height: calc(100vh - 100px);
            padding: 2rem 5%;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        .content-left {
            flex: 1.1;
            padding-right: 4rem;
        }

        .badge {
            display: inline-block;
            padding: 0.4rem 1rem;
            background: rgba(46, 230, 139, 0.1);
            color: var(--mint-green);
            border: 1px solid rgba(46, 230, 139, 0.2);
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        .content-left h1 {
            font-size: 4rem;
            line-height: 1.1;
            font-weight: 800;
            margin-bottom: 1.5rem;
            letter-spacing: -1.5px;
            background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .content-left p {
            font-size: 1.25rem;
            line-height: 1.7;
            color: var(--text-sub);
            margin-bottom: 3rem;
            font-weight: 400;
            max-width: 90%;
        }

        .action-buttons {
            display: flex;
            gap: 1.5rem;
        }

        .btn-primary {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            background-color: var(--mint-green);
            color: #0b0f19;
            font-weight: 700;
            font-size: 1.1rem;
            padding: 1.1rem 3rem;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 10px 30px var(--mint-glow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid var(--mint-green);
            flex: 1;
            max-width: 220px;
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 40px rgba(46, 230, 139, 0.6);
        }

        .btn-secondary {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            background-color: transparent;
            color: var(--text-main);
            font-weight: 600;
            font-size: 1.1rem;
            padding: 1.1rem 3rem;
            border-radius: 50px;
            text-decoration: none;
            border: 2px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex: 1;
            max-width: 220px;
            backdrop-filter: blur(5px);
        }

        .btn-secondary:hover {
            border-color: rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.05);
            transform: translateY(-3px);
        }

        /* Right Side Image Styling */
        .content-right {
            flex: 0.9;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Image Backdrop Glow */
        .image-glow {
            position: absolute;
            width: 70%;
            height: 70%;
            background: radial-gradient(circle, var(--mint-glow) 0%, transparent 60%);
            filter: blur(40px);
            z-index: 1;
            animation: pulse 4s ease-in-out infinite alternate;
        }

        .content-right img {
            width: 100%;
            max-width: 600px;
            height: auto;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 0.8; transform: scale(1.1); }
        }

        /* Responsive */
        @media (max-width: 1024px) {
            header {
                flex-direction: column;
                gap: 1.5rem;
            }
            nav {
                width: 100%;
                justify-content: center;
                gap: 1.5rem;
            }
            .nav-right {
                display: none;
            }
            main {
                flex-direction: column;
                text-align: center;
                padding-top: 3rem;
            }
            .content-left {
                padding-right: 0;
                margin-bottom: 4rem;
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .content-left h1 {
                font-size: 3rem;
            }
            .content-left p {
                max-width: 100%;
            }
            .action-buttons {
                justify-content: center;
                width: 100%;
                flex-wrap: wrap;
            }
            .content-right {
                width: 100%;
                margin-bottom: 3rem;
            }
        }
    </style>
</head>
<body>

    <div class="ambient-glow-1"></div>
    <div class="ambient-glow-2"></div>

    <header>
        <div class="logo">
            <span class="logo-icon">⚡</span>
            Sahay Credit
        </div>
        <nav>
            <a href="#" class="active">Home</a>
            <a href="map.html">Map</a>
            <a href="#">Features</a>
            <a href="demo.html">Demo</a>
        </nav>
        <div class="nav-right">
            <a href="borrower.html" class="btn-outline">Get Started</a>
        </div>
    </header>

    <main>
        <div class="content-left">
            <div class="badge">AI-Powered Scoring</div>
            <h1>Financial Inclusion Starts With Better Credit</h1>
            <p>Helping first-time borrowers, gig workers, and MSMEs access fair credit through behavioral analysis.</p>
            
            <div class="action-buttons">
                <a href="lender.html" class="btn-primary">Lender</a>
                <a href="borrower.html" class="btn-secondary">Borrower</a>
            </div>
        </div>

        <div class="content-right">
            <div class="image-glow"></div>
            <!-- Using the transparent image uploaded by the user -->
            <img src="hands.png" alt="Hands holding glowing gold coin">
        </div>
    </main>

</body>
</html>
