services:
  # ── Node.js Backend (existing) ──
  - type: web
    runtime: node
    name: sahaycredit
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ML_SERVICE_URL
        fromService:
          type: web
          name: sahaycredit-ml
          property: host
          prefix: https://
    autoDeploy: true
    repo: https://github.com/hunny0025/SahayCredit.git
    branch: main

  # ── Python ML Fraud/Credit Service ──
  - type: web
    runtime: python
    name: sahaycredit-ml
    plan: free
    buildCommand: pip install -r ml/fraud_service/requirements.txt
    startCommand: uvicorn ml.fraud_service.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.12"
    autoDeploy: true
    repo: https://github.com/hunny0025/SahayCredit.git
    branch: main
